<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Dolphin ID · Playground</title><link rel="stylesheet" href="styles.css" /></head>
<body>
  <header class="nav"><div class="container nav-inner"><a class="brand" href="index.html">Dolphin ID Playground</a><nav class="nav-links"><a href="embedded-login.html">Login UI</a><a href="debug.html">Debug</a><a href="dashboard-setup.html">Setup</a></nav></div></header>
  <main>
    <section class="hero" data-od-id="playground">
      <div class="container grid grid-2">
        <div><p class="eyebrow">PLAYGROUND</p><h1>Configure the login path before touching app code.</h1><p class="lead" style="margin-top: 24px;">Use mock wallets to validate chain selection, auth mode, storage behavior and ConnectButton state transitions.</p></div>
        <div class="panel panel-pad">
          <div class="grid">
            <div class="field"><label>Chain</label><select class="select" data-chain><option>EVM</option><option>Sui</option><option>Solana</option><option>Bitcoin</option><option>Aptos</option></select></div>
            <div class="field"><label>Auth mode</label><select class="select" data-auth-mode><option>hosted</option><option>self-hosted</option></select></div>
            <div class="field"><label>Token storage</label><select class="select" data-storage><option>httpOnly cookie</option><option>memory</option><option>localStorage</option></select></div>
            <div class="notice" data-preview></div>
          </div>
        </div>
      </div>
    </section>
    <section class="section" data-od-id="error-simulator"><div class="container"><div class="toolbar"><div><p class="eyebrow">ERROR SIMULATOR</p><h2>Force the states developers forget to test.</h2></div></div><div class="grid grid-4"><button class="btn btn-ghost">NONCE EXPIRED</button><button class="btn btn-ghost">SIGNATURE FAILED</button><button class="btn btn-ghost">DOMAIN ERROR</button><button class="btn btn-ghost">REFRESH FAILED</button></div></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
